apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mysql-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-v2
  template:
    metadata:
      labels:
        app: mysql-v2
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpass
            - name: MYSQL_DATABASE
              value: mydb
            - name: MYSQL_USER
              value: admin
            - name: MYSQL_PASSWORD
              value: secret
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql 
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-v2-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-v2
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mysql-v2
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-v2-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
